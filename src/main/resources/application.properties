spring.application.name=geek-text

# PostgreSQL datasource (override via environment variables if needed)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/geek_text}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:geek_text_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Geektext@master}

# JPA/Hibernate settings for Sprint 2 data modeling
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
